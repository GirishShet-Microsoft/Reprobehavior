name: Trigger ADO Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger ADO Pipeline
        env:
          ADO_TOKEN: ${{ secrets.ADO_TOKEN }}
          AZURE_DEVOPS_URL: https://dev.azure.com/girishnshet10/Giri
          BUILD_ID: "232"

          SOURCE_BRANCH: refs/heads/${{ github.event.pull_request.head.ref }}
          TRIGGER_SHA: ${{ github.sha }}

          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}

        run: |
          set -e

          echo "GitHub Ref: $SOURCE_BRANCH"
          echo "GitHub SHA: $TRIGGER_SHA"

          COMMIT_MESSAGE="$COMMIT_MESSAGE

          $(python3 -c "print('LONGTEXT'*5000)")"

          echo "Commit message length:"
          echo "${#COMMIT_MESSAGE}"

          PAYLOAD=$(jq -n \
            --argjson id "$BUILD_ID" \
            --arg sha "$TRIGGER_SHA" \
            --arg message "$COMMIT_MESSAGE" \
            '{
              definition: { id: $id },
              reason: "manual",
              triggerInfo: {
                "ci.sourceVersion": $sha,
                "ci.message": $message
              }
            }')

          echo "Payload created successfully"

          HTTP_RESPONSE=$(curl -s -w "HTTPSTATUS:%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $ADO_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$AZURE_DEVOPS_URL/_apis/build/builds?api-version=7.0")

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | sed -e 's/HTTPSTATUS\:.*//g')
          HTTP_STATUS=$(echo "$HTTP_RESPONSE" | tr -d '\n' | sed -e 's/.*HTTPSTATUS://')

          echo "HTTP Status: $HTTP_STATUS"
          echo "Response Body:"
          echo "$HTTP_BODY"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Failed to trigger pipeline"
            exit 1
          fi

          echo "Pipeline triggered successfully"
